<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      font-size: 14px;
      color: #a0aec0;
      min-height: 20px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .current {
      font-size: 36px;
      font-weight: 300;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.08s, filter 0.08s;
    }

    button:active {
      transform: scale(0.94);
      filter: brightness(0.85);
    }

    .btn-func {
      background: #2d4a7a;
      color: #90cdf4;
    }

    .btn-operator {
      background: #e67e22;
      color: #fff;
    }

    .btn-digit {
      background: #1e3a5f;
      color: #e2e8f0;
    }

    .btn-zero {
      grid-column: span 2;
    }

    .btn-equals {
      background: #2ecc71;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-func" onclick="calc.clear(); updateDisplay()">AC</button>
      <button class="btn-func" onclick="calc.toggleSign(); updateDisplay()">+/-</button>
      <button class="btn-func" onclick="calc.inputPercent(); updateDisplay()">%</button>
      <button class="btn-operator" onclick="calc.setOperator('/'); updateDisplay()">Ă·</button>

      <!-- Row 2 -->
      <button class="btn-digit" onclick="calc.inputDigit('7'); updateDisplay()">7</button>
      <button class="btn-digit" onclick="calc.inputDigit('8'); updateDisplay()">8</button>
      <button class="btn-digit" onclick="calc.inputDigit('9'); updateDisplay()">9</button>
      <button class="btn-operator" onclick="calc.setOperator('*'); updateDisplay()">Ă—</button>

      <!-- Row 3 -->
      <button class="btn-digit" onclick="calc.inputDigit('4'); updateDisplay()">4</button>
      <button class="btn-digit" onclick="calc.inputDigit('5'); updateDisplay()">5</button>
      <button class="btn-digit" onclick="calc.inputDigit('6'); updateDisplay()">6</button>
      <button class="btn-operator" onclick="calc.setOperator('-'); updateDisplay()">âˆ’</button>

      <!-- Row 4 -->
      <button class="btn-digit" onclick="calc.inputDigit('1'); updateDisplay()">1</button>
      <button class="btn-digit" onclick="calc.inputDigit('2'); updateDisplay()">2</button>
      <button class="btn-digit" onclick="calc.inputDigit('3'); updateDisplay()">3</button>
      <button class="btn-operator" onclick="calc.setOperator('+'); updateDisplay()">+</button>

      <!-- Row 5 -->
      <button class="btn-digit btn-zero" onclick="calc.inputDigit('0'); updateDisplay()">0</button>
      <button class="btn-digit" onclick="calc.inputDecimal(); updateDisplay()">.</button>
      <button class="btn-equals" onclick="calc.calculate(); updateDisplay()">=</button>
    </div>
  </div>

  <script src="calculator.js"></script>
  <script>
    const calc = new Calculator();

    const operatorSymbols = { '+': '+', '-': 'âˆ’', '*': 'Ă—', '/': 'Ă·' };

    function updateDisplay() {
      document.getElementById('current').textContent = calc.getDisplay();

      const exprEl = document.getElementById('expression');
      if (calc.previousValue && calc.operator) {
        exprEl.textContent = calc.previousValue + ' ' + operatorSymbols[calc.operator];
      } else {
        exprEl.textContent = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') calc.inputDigit(e.key);
      else if (e.key === '.') calc.inputDecimal();
      else if (e.key === '+') calc.setOperator('+');
      else if (e.key === '-') calc.setOperator('-');
      else if (e.key === '*') calc.setOperator('*');
      else if (e.key === '/') { e.preventDefault(); calc.setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calc.calculate();
      else if (e.key === 'Escape') calc.clear();
      else if (e.key === '%') calc.inputPercent();
      else return;
      updateDisplay();
    });
  </script>
</body>
</html>
